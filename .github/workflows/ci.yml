name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test ./internal/... \
            -covermode=atomic \
            -coverpkg=./internal/... \
            -coverprofile=coverage.out \
            -count=1 \
            -timeout=60s

      - name: Enforce coverage threshold
        run: ./scripts/check-coverage.sh coverage.out 95

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14
